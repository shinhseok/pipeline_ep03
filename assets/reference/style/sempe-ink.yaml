# 뉘앙스 미기재 시 기본값 (첫 번째 뉘앙스 = nuance_a)
v3_emotion_nuance_defaults:
  HUMOR: sardonic
  REFLECTIVE: contemplative
  AWE: overwhelming
  REVEAL: eureka
  TENSION: dread

# 레거시 호환: 기존 표정 전용 매핑 (v3_emotion_expressions 대체)
# 하위 호환을 위해 유지 — 새 프로젝트는 v3_emotion_direction 사용
v3_emotion_expressions:
  REVEAL: "눈이 크게 떠지고 입이 벌어진 채 뒤로 살짝 물러서는"
  REFLECTIVE: "시선을 아래로 떨구고 입을 조용히 다문 채 가만히 있는"
  HUMOR: "한쪽 눈썹을 치켜올리고 입꼬리가 비스듬히 올라간"
  AWE: "눈이 동그랗게 커지고 입이 살짝 벌어진 채 멈춰 있는"
  TENSION: "눈을 가늘게 좁히고 이마에 주름을 잡은 채 어깨를 잔뜩 움츠린"

# ── E12. Bean 제스처 양성 어휘 (v3_bean_gesture_vocabulary) ──
# creative_intent [감정선]에 "할 수 있는 것"을 정의한다.
# 감정 과장형 표현 포함 (disney-principles 원칙 10 참조).
v3_bean_gesture_vocabulary:
  head:
    - "고개 갸우뚱 (한쪽 기울기)"
    - "고개 푹 숙임"
    - "고개 뒤로 젖힘"
    - "한쪽 돌려 시선 회피"
    - "목 움츠림 (어깨 속으로 쏙)"
    - "뒤돌아봄 (3/4 후면)"
  torso:
    - "앞으로 기울어짐 (호기심)"
    - "뒤로 젖힘 (놀람/경외)"
    - "S-curve (여유/사색)"
    - "C-curve 하강 (피로/슬픔)"
    - "상체 스프링 상승 (발견/환희)"
    - "몸통 찌그러짐 (압박)"
    - "한쪽으로 비스듬히 (냉소)"
  arms:
    - "한 팔 뻗어 가리킴"
    - "양팔 벌려 허우적"
    - "팔짱 (방어/냉소)"
    - "주먹 쥠 (분노/결의)"
    - "팔 쭈욱 뻗음 (±20%, 경탄)"
    - "소품 쥐기 (관계 표현)"
    - "손바닥 벌림 (무력함)"
    - "뒤에서 깍지 (사색)"
  weight:
    - "한 발에 체중 (비대칭)"
    - "양발 균등 (안정)"
    - "발끝 들림 (기대감)"
    - "쪼그려 앉음 (위축)"
    - "점프 직전 (도약감)"

# ── E13. 선 품질 빌딩 블록 (v3_line_character) ──
# 스틸 시퀀스에서 선의 성격 변화가 서사를 전달한다.
# shot-composer가 creative_intent에 선 품질을 지정하면
# visual-director가 image_prompt P2에 해당 서술을 통합한다.
v3_line_character:
  tremor:
    label: "떨림 (수공예)"
    prompt_insert: >-
      가느다란 떨림이 느껴지는 잉크 선
    suited_for: ["REFLECTIVE", "serene", "contemplative"]
    narrative_meaning: "인간의 손, 수공예의 온기, 살아있는 선"
  mechanical:
    label: "균일 (기계적)"
    prompt_insert: >-
      정확하고 균일한 간격으로 반복되는 잉크 선
    suited_for: ["TENSION", "pressure", "dread"]
    narrative_meaning: "기계화, 반복, 인간성 상실"
  fading:
    label: "소멸 (흐려짐)"
    prompt_insert: >-
      가장자리가 흐려지며 사라져가는 듯한 잉크 선
    suited_for: ["REFLECTIVE", "melancholy"]
    narrative_meaning: "상실, 기억의 희미함, 소멸"
  incomplete:
    label: "미완성 (그리다 만)"
    prompt_insert: >-
      형태가 반쯤만 그려진 듯 끊기고 비어있는 잉크 선
    suited_for: ["REVEAL", "TENSION"]
    narrative_meaning: "과정 중, 미완의 변화, 가능성"
  restored:
    label: "회복 (다시 떨리는)"
    prompt_insert: >-
      한때 균일했던 선이 다시 미세한 떨림을 되찾은 잉크 선
    suited_for: ["REVEAL", "eureka", "REFLECTIVE"]
    narrative_meaning: "인간성 회복, 질문의 힘, 되찾은 자유"
